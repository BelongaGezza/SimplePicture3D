[[permission]]
identifier = "allow-generate-depth-map"
description = "Enables depth map generation, retrieval, adjustment, undo/redo, and mask commands. Sprint A retired `get_mesh_data` along with the 2.5D mesh pipeline; the 3D point cloud commands (ADR-012) will be added in their own permission group in Sprint B."
commands.allow = [
    "generate_depth_map",
    "get_depth_map",
    "get_depth_histogram",
    "set_depth_adjustment_params",
    "get_depth_adjustment_params",
    "get_undo_redo_state",
    "undo",
    "redo",
    "clear_history",
    "reset_depth_adjustments",
    "get_mask",
    "set_mask_region",
    "set_mask",
    "clear_mask",
    "save_mask_to_path",
    "load_mask_from_path",
]
