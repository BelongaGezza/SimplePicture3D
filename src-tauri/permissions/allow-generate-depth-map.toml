[[permission]]
identifier = "allow-generate-depth-map"
description = "Enables depth map generation, retrieval, adjustment, undo/redo, and mesh generation commands."
commands.allow = [
    "generate_depth_map",
    "get_depth_map",
    "get_depth_histogram",
    "set_depth_adjustment_params",
    "get_depth_adjustment_params",
    "get_undo_redo_state",
    "undo",
    "redo",
    "clear_history",
    "reset_depth_adjustments",
    "get_mesh_data",
]
